<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Salary Management System</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<h2>Employee Salary Management System</h2>

<table>
    <tr>
        <td>Employee Name :</td>
        <td><input type="text" id="name"></td>
    </tr>
    <tr>
        <td>Employee ID :</td>
        <td><input type="text" id="empId"></td>
    </tr>
    <tr>
        <td>Employee Salary :</td>
        <td><input type="number" id="salary"></td>
    </tr>
    <tr>
        <td>Employee Department :</td>
        <td><input type="text" id="dept"></td>
    </tr>
</table>

<br>
<button onclick="addEmployee()">Add Employee</button>
<button onclick="displayEmployees()">Display All</button>
<button onclick="filterSalary()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countDepartment()">Count by Department</button>

<div id="output"></div>

<script src="experiment5.js"></script>
</body>
</html>
